name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app:
    name: Build macOS app
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Run the RestLedger tests
        run: ./test.sh
      - name: Compile HeartEyes.app
        run: ./build.sh
      - name: Verify the app bundle exists
        run: test -d build/HeartEyes.app && echo "✓ built"
